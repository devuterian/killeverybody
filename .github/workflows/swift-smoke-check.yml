name: Swift smoke check

on:
  push:
    paths:
      - "KillEverybodyApp/**"
      - "scripts/smoke-check.sh"
  pull_request:
    paths:
      - "KillEverybodyApp/**"
      - "scripts/smoke-check.sh"

jobs:
  typecheck:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (Debug, unsigned, full SPM + embed)
        run: |
          set -euo pipefail
          xcodebuild \
            -project KillEverybodyApp/KillEverybodyApp.xcodeproj \
            -scheme KillEverybodyApp \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build
